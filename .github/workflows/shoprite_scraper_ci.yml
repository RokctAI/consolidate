name: Shoprite Scraper CI

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Scraper
        run: |
          python .rokct/scripts/scrappers/shoprite/shoprite_scraper.py --limit 10
        env:
          PYTHONPATH: .

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "products" ]; then
            git add products/
            git commit -m "chore: auto-update scraped products [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "No products scraped, skipping commit."
          fi
