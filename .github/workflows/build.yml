env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Build (Smart)

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build Type (apk/appbundle) - Ignored for Node'
        required: true
        default: 'apk'
        type: choice
        options:
        - apk
        - appbundle
      node-version:
        type: string
        default: '24'
      python-version:
        type: string
        default: '3.14'
      mariadb-version:
        type: string
        default: '10.6'
      postgres-version:
        type: string
        default: '15'
      db-type:
        type: string
        default: 'mariadb'
      flutter-channel:
        type: string
        default: 'stable'
      flutter-version:
        type: string
        default: '3.24.0'
        description: "Pin Flutter version (e.g. 3.24.0)"
      java-version:
        type: string
        default: '17'
      version_format:
        type: string
        default: '##.##.##'
        description: "Format for version bumping (e.g. ##.##.## or ##.##.#)"
      run_verify:
        type: boolean
        default: true
        description: "Run continuous verification on Android emulator"
      backfill_ai_notes_cutoff_version:
        type: string
        default: ""
        description: "Regenerate AI release notes starting from this version (use 'all' for full history)"

permissions: write-all
jobs:
  # --- 1. DETECT PROJECT TYPE ---
  detect:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --user root
    outputs:
      type: ${{ steps.check.outputs.type }}
    steps:
      - name: System Essentials
        run: apt-get update && apt-get install -y sudo git curl

      - uses: actions/checkout@v6
      - name: Check Project Type
        id: check
        run: |
          if [ -f "pubspec.yaml" ]; then
             echo "type=flutter" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
             echo "type=node" >> "$GITHUB_OUTPUT"
          elif [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
             echo "type=frappe" >> "$GITHUB_OUTPUT"
          else
             echo "type=none" >> "$GITHUB_OUTPUT"
          fi

  # --- 2. UNIFIED PIPELINE (Smart) ---
  pipeline:
    needs: detect
    permissions: write-all
    uses: RokctAI/shared-workflows/.github/workflows/universal-pipeline.yml@main
    with:
      project_type: ${{ needs.detect.outputs.type }}
      # Quality Gate Toggles
      run_security: true
      run_lint: true
      run_ci: ${{ needs.detect.outputs.type != 'none' }}
      run_verify: ${{ inputs.run_verify != false }}
      backfill_ai_notes_cutoff_version: ${{ inputs.backfill_ai_notes_cutoff_version }}
      # Deployment Configuration (Immediate release on Main)
      release_strategy: 'immediate'
      build_android: true
      # Environment configuration
      node-version: ${{ inputs.node-version }}
      python-version: ${{ inputs.python-version }}
      mariadb-version: ${{ inputs.mariadb-version }}
      postgres-version: ${{ inputs.postgres-version }}
      db-type: ${{ inputs.db-type }}
      flutter-channel: ${{ inputs.flutter-channel }}
      # Recommended: Pin to 3.24.0 to avoid google_fonts/kotlin errors
      flutter-version: ${{ inputs.flutter-version || '3.24.0' }}
      java-version: ${{ inputs.java-version }}
      version_format: ${{ inputs.version_format || '##.##.##' }}
    secrets: inherit
