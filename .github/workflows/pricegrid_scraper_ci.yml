name: PriceGrid Scraper CI

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Run RokctAI Install Script
        run: curl -sSL https://raw.githubusercontent.com/RokctAI/shared-workflows/main/install.sh | bash

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Scraper
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python .rokct/scripts/scrappers/shoprite/scraper.py --limit 20 --headless
        env:
          PYTHONPATH: .

      - name: Update Prices and Maintain Images
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python .rokct/scripts/scrappers/shoprite/maintain.py
        env:
          PYTHONPATH: .

      - name: Publish Static Data
        run: |
          python .rokct/scripts/publisher/publish.py
        env:
          PYTHONPATH: .

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "products" ]; then
            git add products/
            git add published/
            git commit -m "chore: auto-update scraped products and static data [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "No products scraped, skipping commit."
          fi
