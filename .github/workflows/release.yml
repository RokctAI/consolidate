name: Auto Release (Weekly)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-release
  cancel-in-progress: true
on:
  schedule:
    - cron: '0 23 * * 5'
  workflow_dispatch:
    inputs:
      node-version:
        type: string
        default: '24'
      python-version:
        type: string
        default: '3.14'
      mariadb-version:
        type: string
        default: '10.6'
      postgres-version:
        type: string
        default: '15'
      db-type:
        type: string
        default: 'mariadb'
      flutter-channel:
        type: string
        default: 'stable'
      java-version:
        type: string
        default: '17'
      version_format:
        type: string
        default: '##.##.##'
        description: "Format for version bumping (e.g. ##.##.## or ##.##.#)"
      run_verify:
        type: boolean
        default: true
        description: "Run continuous verification on Android emulator"
      backfill_ai_notes_cutoff_version:
        type: string
        default: ""
        description: "Regenerate AI release notes starting from this version (use 'all' for full history)"

permissions: write-all
jobs:
  # --- 1. DETECT PROJECT TYPE ---
  detect:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --user root
    outputs:
      type: ${{ steps.check.outputs.type }}
    steps:
      - name: System Essentials
        run: apt-get update && apt-get install -y sudo git curl

      - uses: actions/checkout@v6
      - name: Check Project Type
        id: check
        run: |
          if [ -f "pubspec.yaml" ]; then
             echo "type=flutter" >> "$GITHUB_OUTPUT"
          elif [ -f "package.json" ]; then
             echo "type=node" >> "$GITHUB_OUTPUT"
          elif [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ]; then
             echo "type=frappe" >> "$GITHUB_OUTPUT"
          else
             echo "type=none" >> "$GITHUB_OUTPUT"
          fi

  # --- 2. UNIFIED PIPELINE ---
  release:
    needs: detect
    permissions: write-all
    uses: RokctAI/shared-workflows/.github/workflows/universal-pipeline.yml@main
    with:
      project_type: ${{ needs.detect.outputs.type }}
      run_ci: ${{ needs.detect.outputs.type != 'none' }}
      run_verify: ${{ inputs.run_verify != false }}
      # Dogfooding: Use the new Weekly Strategy
      release_strategy: 'immediate'
      backfill_ai_notes_cutoff_version: ${{ inputs.backfill_ai_notes_cutoff_version }}

      # RC Cleanup: Delete RC releases/tags after promotion to stable
      cleanup_rc_releases: true

      # One-time cleanup: Set a cutoff date (YYYY-MM-DD) to run cleanup once if past this date
      # After cleanup runs once, a marker file is created and cleanup won't run again
      # Example: one_time_cleanup_cutoff_date: '2026-02-01'
      one_time_cleanup_cutoff_date: '2026-01-30'

      # Brain Endpoint
      brain_endpoint: https://platform.rokct.ai/api/method/brain.api.generate_release_notes

      # Build APK
      build_android: true
      # Environment configuration
      node-version: ${{ inputs.node-version || '24' }}
      python-version: ${{ inputs.python-version || '3.14' }}
      mariadb-version: ${{ inputs.mariadb-version || '10.6' }}
      postgres-version: ${{ inputs.postgres-version || '15' }}
      db-type: ${{ inputs.db-type || 'mariadb' }}
      flutter-channel: ${{ inputs.flutter-channel || 'stable' }}
      # Recommended: Pin Flutter version to avoid compiler issues (e.g., google_fonts)
      flutter-version: '3.24.0'
      java-version: ${{ inputs.java-version || '17' }}
      version_format: ${{ inputs.version_format || '##.##.##' }}
    secrets: inherit
